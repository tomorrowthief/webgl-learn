<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e}
canvas{display:block}
#error{display:none;position:fixed;top:0;left:0;right:0;background:rgba(239,68,68,.95);color:#fff;padding:12px 16px;font:13px Menlo,Monaco,monospace;line-height:1.5;z-index:1000;white-space:pre-wrap}
</style>
</head>
<body>
<div id="error"></div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, controls, animationId = null;
const container = document.body;
const errorEl = document.getElementById('error');

function initRenderer() {
  if (renderer) { renderer.dispose(); renderer.domElement.remove(); }
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(renderer.domElement);
}

function cleanup() {
  if (animationId !== null) { cancelAnimationFrame(animationId); animationId = null; }
  if (controls) { controls.dispose(); controls = null; }
  if (scene) {
    scene.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach(m => { m.dispose(); });
        else obj.material.dispose();
      }
    });
    scene.clear(); scene = null;
  }
  camera = null;
  if (renderer) { renderer.dispose(); renderer.domElement.remove(); renderer = null; }
}

function setupScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color('#1a1a2e');
  camera = new THREE.PerspectiveCamera(60, container.clientWidth / Math.max(container.clientHeight, 1), 0.1, 100);
  camera.position.set(3, 2, 5); camera.lookAt(0, 0, 0);
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.08;
  scene.add(new THREE.AmbientLight('#ffffff', 0.5));
  const dl = new THREE.DirectionalLight('#ffffff', 1.0); dl.position.set(5, 10, 7); scene.add(dl);
  const pl = new THREE.PointLight('#6366F1', 0.5); pl.position.set(-3, 2, 3); scene.add(pl);
}

function animate() {
  animationId = requestAnimationFrame(animate);
  if (typeof window.animate === 'function') window.animate();
  if (controls) controls.update();
  if (renderer && scene && camera) renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  if (camera) { camera.aspect = container.clientWidth / Math.max(container.clientHeight, 1); camera.updateProjectionMatrix(); }
  if (renderer) renderer.setSize(container.clientWidth, container.clientHeight);
});

window.addEventListener('message', event => {
  const data = event.data;
  if (!data || typeof data !== 'object') return;
  if (data.type === 'run') {
    try {
      errorEl.style.display = 'none';
      cleanup();
      initRenderer();
      setupScene();
      animate();
      new Function('THREE', 'OrbitControls', 'scene', 'camera', 'renderer', data.code)(THREE, OrbitControls, scene, camera, renderer);
      window.parent.postMessage({ type: 'result', success: true }, '*');
    } catch(err) {
      errorEl.style.display = 'block';
      errorEl.textContent = err.name + ': ' + err.message;
      window.parent.postMessage({ type: 'result', success: false, error: { type: err.name || 'Error', message: err.message || 'Unknown' } }, '*');
    }
  }
});

window.parent.postMessage({ type: 'ready' }, '*');
</script>
</body>
</html>
